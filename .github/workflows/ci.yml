name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv
        run: python -m venv .venv

      - name: Install deps
        run: |
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[tests]"

      - name: Mypy
        run: .venv/bin/python -m mypy --config-file mypy.ini src tests

      - name: Ruff
        run: .venv/bin/python -m ruff check

      - name: Pytest
        run: .venv/bin/python -m pytest tests

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Read package version
        id: package-version
        run: |
          version=$(python -c "import sys; sys.path.insert(0, 'src'); import mltools; print(mltools.__version__)")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          gh release create "v${VERSION}" dist/* \
            --title "v${VERSION}" \
            --notes "Published hb-mltools ${VERSION} to PyPI."
